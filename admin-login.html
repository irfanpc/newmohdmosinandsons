<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Mohd Mohsin And Sons | Admin Login</title>
    <link rel="icon" href="img/logo.jpg?v=2" type="image/jpeg">
    <link rel="stylesheet" href="css/style.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background-color: var(--secondary-color);">
    <div class="container">
        <div class="admin-login-box" style="background-color: #fff;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <img src="img/logo.jpg?v=2" alt="New Mohd Mohsin And Bros" class="brand-logo" style="margin: 0 auto 1rem auto; height: 120px; width: 120px; object-fit: cover; border-radius: 50%;">
                <h2 style="font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 0.5rem; color: var(--text-color);">New Mohd Mohsin & Bros</h2>
                <p style="color: var(--text-light);">Admin Panel Access</p>
            </div>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" required placeholder="admin">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="1234">
                </div>
                <p id="loginError" style="color: var(--danger-color); display: none; margin-bottom: 1rem; font-size: 0.9rem;">Invalid credentials. Try admin / 1234</p>
                <button type="submit" class="btn" style="width: 100%;">Login</button>
            </form>
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="index.html" style="font-size: 0.9rem; color: var(--text-light);"><i class="fas fa-arrow-left"></i> Back to Store</a>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            // Simple mock authentication
            if (user === 'admin' && pass === '1234') {
                sessionStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'admin.html';
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }
    </script>
</body>
</html>
